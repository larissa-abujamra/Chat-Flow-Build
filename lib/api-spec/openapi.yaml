openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: flow
    description: Conversation flow editing
  - name: chat
    description: Chat preview powered by an LLM
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /flow:
    get:
      operationId: getFlow
      tags: [flow]
      summary: Get the conversation flow
      description: Returns the saved conversation flow, creating a default one if none exists.
      responses:
        "200":
          description: The conversation flow
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Flow"
    put:
      operationId: updateFlow
      tags: [flow]
      summary: Save the conversation flow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FlowInput"
      responses:
        "200":
          description: The saved conversation flow
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Flow"
  /versions:
    get:
      operationId: listFlowVersions
      tags: [flow]
      summary: List saved flow versions
      description: Returns all saved flow version snapshots, newest first.
      responses:
        "200":
          description: The saved flow versions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FlowVersion"
    post:
      operationId: createFlowVersion
      tags: [flow]
      summary: Create a flow version snapshot
      description: >
        Saves a snapshot of the flow as a new version. If no name is provided,
        the server assigns an auto-incrementing default name ("Flow Chart vN").
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFlowVersionInput"
      responses:
        "201":
          description: The created flow version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlowVersion"
  /versions/{id}:
    patch:
      operationId: renameFlowVersion
      tags: [flow]
      summary: Rename a flow version
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFlowVersionInput"
      responses:
        "200":
          description: The updated flow version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlowVersion"
        "404":
          description: Version not found
    delete:
      operationId: deleteFlowVersion
      tags: [flow]
      summary: Delete a flow version
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Version deleted
        "404":
          description: Version not found
  /chat:
    post:
      operationId: sendChat
      tags: [chat]
      summary: Advance the chat preview
      description: >
        Given the current flow, conversation history, and current node, uses an
        LLM to interpret the latest answer, route to the matching branch, and
        return the next message.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatInput"
      responses:
        "200":
          description: The assistant's next message and updated position
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResult"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    FlowBranch:
      type: object
      required: [id, label, targetNodeId]
      properties:
        id:
          type: string
        label:
          type: string
        targetNodeId:
          type: ["string", "null"]
        color:
          type: ["string", "null"]
    FlowNode:
      type: object
      required: [id, question, branches]
      properties:
        id:
          type: string
        question:
          type: string
        branches:
          type: array
          items:
            $ref: "#/components/schemas/FlowBranch"
        position:
          type: object
          required: [x, y]
          properties:
            x:
              type: number
            y:
              type: number
    Flow:
      type: object
      required: [id, name, startNodeId, nodes, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        startNodeId:
          type: ["string", "null"]
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/FlowNode"
        updatedAt:
          type: string
    FlowInput:
      type: object
      required: [name, startNodeId, nodes]
      properties:
        name:
          type: string
        startNodeId:
          type: ["string", "null"]
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/FlowNode"
    FlowVersion:
      type: object
      required: [id, name, startNodeId, nodes, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        startNodeId:
          type: ["string", "null"]
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/FlowNode"
        createdAt:
          type: string
        updatedAt:
          type: string
    CreateFlowVersionInput:
      type: object
      required: [startNodeId, nodes]
      properties:
        name:
          type: string
        startNodeId:
          type: ["string", "null"]
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/FlowNode"
    UpdateFlowVersionInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
    ChatInput:
      type: object
      required: [flow, messages, currentNodeId]
      properties:
        flow:
          $ref: "#/components/schemas/FlowInput"
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
        currentNodeId:
          type: ["string", "null"]
    ChatResult:
      type: object
      required: [reply, currentNodeId, matchedBranchId, done]
      properties:
        reply:
          type: string
        currentNodeId:
          type: ["string", "null"]
        matchedBranchId:
          type: ["string", "null"]
        done:
          type: boolean
